services:
  # Base de Datos
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: words
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./words.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - game_network

  # Instancia 1 de la Aplicación (Simulando EC2 - 1)
  app1:
    build: .
    environment:
      - NODE_ENV=production
      # Simulamos la conexión a DB usando el nombre del servicio en docker-compose
      - DATABASE_URL=postgres://postgres:123456@db:5432/words
    depends_on:
      - db
    networks:
      - game_network

  # Instancia 2 de la Aplicación (Simulando EC2 - 2)
  app2:
    build: .
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:123456@db:5432/words
    depends_on:
      - db
    networks:
      - game_network

  # Balanceador de Carga (Simulando AWS Application Load Balancer - ALB)
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
    networks:
      - game_network

volumes:
  postgres_data:

networks:
  game_network:
    driver: bridge
